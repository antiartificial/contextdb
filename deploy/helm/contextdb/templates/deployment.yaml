apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "contextdb.fullname" . }}
  labels:
    {{- include "contextdb.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "contextdb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "contextdb.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "contextdb.fullname" . }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: rest
              containerPort: {{ .Values.service.restPort }}
              protocol: TCP
            - name: observe
              containerPort: {{ .Values.service.observePort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: observe
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: observe
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.dataDir }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "contextdb.fullname" . }}
      {{- end }}
