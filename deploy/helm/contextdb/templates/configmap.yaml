apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "contextdb.fullname" . }}
  labels:
    {{- include "contextdb.labels" . | nindent 4 }}
data:
  CONTEXTDB_MODE: {{ .Values.config.mode | quote }}
  CONTEXTDB_DATA_DIR: {{ .Values.config.dataDir | quote }}
  CONTEXTDB_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  CONTEXTDB_DSN: {{ .Values.postgres.dsn | quote }}
  CONTEXTDB_GRPC_ADDR: {{ printf ":%d" (int .Values.service.grpcPort) | quote }}
  CONTEXTDB_REST_ADDR: {{ printf ":%d" (int .Values.service.restPort) | quote }}
  CONTEXTDB_OBS_ADDR: {{ printf ":%d" (int .Values.service.observePort) | quote }}
