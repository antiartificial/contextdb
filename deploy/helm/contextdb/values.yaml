replicaCount: 1

image:
  repository: ghcr.io/antiartificial/contextdb
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  grpcPort: 7700
  restPort: 7701
  observePort: 7702

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  mode: "embedded"
  dataDir: "/data"
  logLevel: "info"

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

postgres:
  enabled: false
  dsn: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: contextdb.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
