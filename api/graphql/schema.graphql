type Query {
  search(namespace: String = "default", mode: String = "general", query: String!, filter: FilterInput, limit: Int = 10): SearchResult!
  narrative(namespace: String = "default", mode: String = "general", nodeId: ID!): NarrativeReport
  knowledgeGaps(namespace: String = "default", mode: String = "general", topK: Int, minGapSize: Float, maxGaps: Int): GapReport!
  reviewQueue(namespace: String = "default", mode: String = "general", after: Timestamp, lowConfidenceThreshold: Float, sourceTrustThreshold: Float, sourceTrustDropThreshold: Float, sourceRefutationThreshold: Int, types: [String!], sourceId: String, status: String, owner: String, limit: Int): [ReviewItem!]!
}

type Mutation {
  validateClaim(namespace: String = "default", mode: String = "general", nodeId: ID!, reason: String, quality: Int): FeedbackResult!
  refuteClaim(namespace: String = "default", mode: String = "general", nodeId: ID!, reason: String, quality: Int): FeedbackResult!
  markUseful(namespace: String = "default", mode: String = "general", nodeId: ID!, reason: String, quality: Int): FeedbackResult!
  markStale(namespace: String = "default", mode: String = "general", nodeId: ID!, reason: String, quality: Int): FeedbackResult!
}

type ReviewItem {
  id: ID!
  type: String!
  priority: Float!
  reason: String!
  nodeId: ID
  nodeIds: [ID!]
  sourceId: String
  action: String
  text: String
  createdAt: Timestamp
  suggestedAction: String
  confidence: Float
  status: String
  owner: String
  decision: String
  note: String
  recheckAt: Timestamp
  reviewedAt: Timestamp
}

type FeedbackResult {
  nodeId: ID!
  action: String!
  confidence: Float!
  utility: Float!
  sourceId: String
  sourceCredibility: Float
  reason: String
}

type NarrativeReport {
  nodeId: ID!
  namespace: String!
  generatedAt: Timestamp
  summary: String
  claim: CitedClaim
  evidence: [CitedClaim!]
  contradictions: [CitedClaim!]
  provenance: [CitedClaim!]
  confidenceExplanation: String
}

type CitedClaim {
  nodeId: ID!
  sourceId: String
  text: String
  confidence: Float
  epistemicType: String
  validFrom: Timestamp
  validUntil: Timestamp
  provenanceDepth: Int
  relation: String
}

type GapReport {
  namespace: String!
  gaps: [KnowledgeGap!]
  coverageScore: Float
  totalNodes: Int
  gapsDetected: Int
}

type KnowledgeGap {
  id: ID!
  nearestTopics: [String!]
  centroidVector: [Float!]
  densityScore: Float
  confidenceGap: Float
  temporalGapSeconds: Float
}

input FilterInput {
  and: [FilterInput]
  or: [FilterInput]
  not: FilterInput
  contentContains: String
  similarityMin: Float
  hasEdgeTo: [ID]
  edgeTypes: [String]
  edgeWeightMin: Float
  sourceCredibilityMin: Float
  sourceCredibilityMax: Float
  validAt: Timestamp
  validFromBefore: Timestamp
  validToAfter: Timestamp
}

type SearchResult {
  nodes: [Node!]!
  totalCount: Int!
}

type Node {
  id: ID!
  content: String!
  vector: [Float!]
  credibility: Float!
  validFrom: Timestamp
  validTo: Timestamp
  score: Float
  similarityScore: Float
  confidenceScore: Float
  recencyScore: Float
  utilityScore: Float
  scoreBreakdown: ScoreBreakdown
  retrievalSource: String
  edges: [Edge!]!
  sources: [Source!]!
}

type ScoreBreakdown {
  similarity: Float
  confidence: Float
  recency: Float
  utility: Float
}

type Edge {
  id: ID!
  type: String!
  from: Node!
  to: Node!
  weight: Float!
  credibility: Float!
}

type Source {
  id: ID!
  name: String!
  alpha: Float!
  beta: Float!
  effectiveCredibility: Float!
}

scalar Timestamp
scalar ID
